name: Claude PR Auto Review

# 每次 PR 開啟、重新開啟,或推上新 commit 時觸發
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read          # checkout 需要讀取權限
  pull-requests: write    # Claude 透過 Review API 留言需要寫入權限
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    # 略過草稿 PR,避免對 WIP 分支產生雜訊
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 取得完整歷史,讓 Claude 能比對 base 與 head

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 以繁體中文做 code review,聚焦在 bug、安全性、可維護性
          prompt: |
            請審查這個 pull request 的程式碼變更,並以繁體中文留下回饋。
            請特別注意:
            - 潛在的 bug 與 edge case 處理
            - 安全性問題(如注入、未驗證輸入、硬編碼機密)
            - 程式碼可讀性與可維護性
            - 缺少的測試
            針對具體的行給出 inline 評論,最後寫一段整體摘要。
            如果整體看起來沒問題,請明確說明可以合併。
